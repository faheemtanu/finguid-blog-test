<script>
  // Theme toggle
  const themeToggle = document.getElementById("themeToggle");
  const savedTheme = localStorage.getItem("theme");
  if (savedTheme === "light") {
    document.documentElement.setAttribute("data-theme", "light");
  }

  themeToggle.addEventListener("click", () => {
    const isLight = document.documentElement.getAttribute("data-theme") === "light";
    if (isLight) {
      document.documentElement.removeAttribute("data-theme");
      localStorage.setItem("theme", "dark");
    } else {
      document.documentElement.setAttribute("data-theme", "light");
      localStorage.setItem("theme", "light");
    }
  });

  // Helper: read slug from URL
  function getSlugFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("slug");
  }

  // Helper: format ISO date to nice text
  function formatDate(dateString) {
    if (!dateString) return "";
    const date = new Date(dateString);
    return date.toLocaleDateString("en-US", {
      year: "numeric",
      month: "long",
      day: "numeric"
    });
  }

  async function loadPost() {
    const slug = getSlugFromUrl();
    const articleTitle = document.getElementById("articleTitle");
    const articleCategory = document.getElementById("articleCategory");
    const articleMeta = document.getElementById("articleMeta");
    const articleBody = document.getElementById("articleBody");
    const articleContainer = document.getElementById("articleContainer");
    const notFound = document.getElementById("notFound");

    if (!slug) {
      articleContainer.style.display = "none";
      notFound.style.display = "block";
      notFound.textContent = "No article slug was provided.";
      return;
    }

    try {
      // Fetch posts list
      const res = await fetch("/finguid-blog-test/posts/posts.json");
      const data = await res.json();
      const posts = data.posts || [];
      const post = posts.find((p) => p.slug === slug);

      if (!post) {
        articleContainer.style.display = "none";
        notFound.style.display = "block";
        notFound.textContent = "Sorry, this article could not be found.";
        return;
      }

      // Basic meta
      document.title = post.seoTitle || post.title || "Finguid Blog";
      articleTitle.textContent = post.title || "Untitled article";
      articleCategory.textContent = (post.category || "Article").toUpperCase();

      articleMeta.innerHTML = `
        <span>${post.authorName || "Finguid Editorial"}</span>
        <span>${formatDate(post.createdAt)}</span>
        <span>${post.calculatorName || "Calculator Guide"}</span>
      `;

      // Build image + bodyHtml
      const featuredImageUrl = post.featuredImageUrl || "";
      const featuredImageAlt =
        post.title ? `${post.title} - Finguid` : "Article image";

      const featuredImageHtml = featuredImageUrl
        ? `<img src="${featuredImageUrl}" alt="${featuredImageAlt}" loading="lazy">`
        : "";

      // Remove first <img> from bodyHtml so it does not duplicate
      const rawBodyHtml = post.bodyHtml || "";
      const cleanBodyHtml = rawBodyHtml.replace(/<img[^>]*>/i, "");

      articleBody.innerHTML =
        (featuredImageHtml + cleanBodyHtml) || "<p>No content available.</p>";

      // Optional calculator callout at the bottom
      if (post.calculatorUrl && post.calculatorName) {
        const callout = document.createElement("div");
        callout.className = "calc-callout";
        callout.innerHTML = `
          <strong>Helpful tool</strong>
          Continue planning with the
          <a href="${post.calculatorUrl}" target="_blank" rel="noopener noreferrer">
            ${post.calculatorName}
          </a>.
        `;
        articleBody.appendChild(callout);
      }
    } catch (error) {
      console.error("Error loading post", error);
      articleContainer.style.display = "none";
      notFound.style.display = "block";
      notFound.textContent = "There was a problem loading this article.";
    }
  }

  loadPost();
</script>
